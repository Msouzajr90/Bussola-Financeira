<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Painel do gestor — Marco Souza × Engeval</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EEF3F8; --surface:#FFFFFF;
    --blue:#0078C0; --blue-deep:#005B92; --blue-dark:#00406B; --cyan:#309CD8;
    --ink:#16232E; --muted:#5B6E7B; --line:#D9E4EC;
    --ok:#1D9E75; --ok-bg:#E1F5EE; --warn:#BA7517; --warn-bg:#FAEEDA;
    --bad:#A32D2D; --bad-bg:#FCEBEB;
    --shadow:0 1px 2px rgba(0,64,107,.06), 0 10px 28px rgba(0,64,107,.07);
    --orb:radial-gradient(circle at 32% 28%, #86C7EC 0%, #1E8BCE 42%, #0078C0 66%, #005B92 100%);
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Inter',system-ui,sans-serif; background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased; }
  button{ font:inherit; }
  .topbar{ display:flex; align-items:center; gap:12px; padding:13px clamp(14px,4vw,28px);
    background:var(--surface); border-bottom:1px solid var(--line); box-shadow:0 1px 2px rgba(0,64,107,.08);
    position:sticky; top:0; z-index:20; }
  .topbar .dot{ width:14px; height:14px; border-radius:50%; background:var(--orb); }
  .topbar h1{ font-family:'Archivo',sans-serif; font-weight:800; font-size:17px; color:var(--blue-dark); margin:0; }
  .topbar .sub{ font-size:12.5px; color:var(--muted); margin-left:auto; }
  .wrap{ max-width:1100px; margin:0 auto; padding:clamp(18px,3vw,28px) clamp(14px,4vw,24px) 70px; }

  .gate{ max-width:380px; margin:9vh auto 0; background:var(--surface); border:1px solid var(--line);
    border-radius:16px; padding:28px; box-shadow:var(--shadow); }
  .gate h2{ font-family:'Archivo',sans-serif; font-weight:700; font-size:19px; color:var(--blue-dark); margin:0 0 6px; }
  .gate p{ font-size:13.5px; color:var(--muted); margin:0 0 18px; line-height:1.5; }
  label{ display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:5px; }
  input,textarea,select{ width:100%; font:inherit; font-size:15px; padding:11px 13px; border:1px solid var(--line);
    border-radius:10px; outline:none; background:var(--surface); color:var(--ink); }
  textarea{ resize:vertical; min-height:60px; }
  input:focus,textarea:focus,select:focus{ border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,120,192,.12); }
  .btn{ font-weight:600; font-size:14px; color:#fff; background:var(--orb); border:none; border-radius:10px;
    padding:11px 18px; cursor:pointer; box-shadow:0 3px 10px rgba(0,120,192,.3); }
  .btn:hover{ filter:brightness(1.05); }
  .btn.wide{ width:100%; margin-top:14px; }
  .err{ color:#8A2C2C; font-size:13px; margin-top:12px; min-height:18px; }

  .nav{ display:flex; gap:7px; margin-bottom:18px; flex-wrap:wrap; }
  .nav button{ padding:10px 15px; border:1px solid var(--line); background:var(--surface); border-radius:10px;
    font-size:13.5px; font-weight:600; color:var(--muted); cursor:pointer; }
  .nav button.on{ background:var(--blue-dark); border-color:var(--blue-dark); color:#fff; }
  .nav .pill{ background:var(--warn); color:#fff; border-radius:999px; padding:1px 7px; font-size:11px; margin-left:5px; }
  .nav .spacer{ flex:1; }

  .cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(148px,1fr)); gap:11px; margin-bottom:16px; }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:14px 16px; box-shadow:var(--shadow); }
  .card .k{ font-size:11px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); line-height:1.35; }
  .card .v{ font-family:'Archivo',sans-serif; font-weight:800; font-size:26px; color:var(--blue-dark); margin-top:4px; }
  .card .s{ font-size:11.5px; color:var(--muted); margin-top:2px; }
  .card.alert{ border-color:#EBD2A6; background:var(--warn-bg); }
  .card.alert .v{ color:var(--warn); }
  .card.good .v{ color:var(--ok); }

  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:760px){ .grid2{ grid-template-columns:1fr; } }

  .panel{ background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); overflow:hidden; margin-bottom:14px; }
  .panel-head{ padding:14px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .panel-head strong{ font-family:'Archivo',sans-serif; font-size:14.5px; color:var(--blue-dark); }
  .panel-head .hint{ font-size:12px; color:var(--muted); }
  .pbody{ padding:16px 18px; }

  /* barras */
  .brow{ margin-bottom:13px; }
  .brow:last-child{ margin-bottom:0; }
  .btop{ display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px; gap:10px; }
  .btop .bl{ color:var(--ink); font-weight:500; }
  .btop .bv{ color:var(--muted); font-size:12px; white-space:nowrap; }
  .track{ height:8px; background:var(--paper); border:1px solid var(--line); border-radius:999px; overflow:hidden; }
  .track > i{ display:block; height:100%; background:var(--orb); border-radius:999px; }
  .track.g > i{ background:var(--ok); }
  .track.w > i{ background:var(--warn); }

  table{ width:100%; border-collapse:collapse; }
  th{ text-align:left; font-size:11px; font-weight:600; letter-spacing:.05em; text-transform:uppercase;
    color:var(--muted); padding:11px 16px; border-bottom:1px solid var(--line); background:var(--paper); }
  td{ padding:12px 16px; border-bottom:1px solid var(--line); font-size:14px; vertical-align:middle; }
  tr:last-child td{ border-bottom:none; }
  tbody tr:hover td{ background:#F7FBFD; }
  .pos{ font-family:'Archivo',sans-serif; font-weight:700; color:var(--muted); }
  .lvl{ display:inline-block; font-size:11.5px; font-weight:600; background:#EAF4FB; color:var(--blue-deep);
    border-radius:999px; padding:3px 9px; }
  .pts{ font-family:'Archivo',sans-serif; font-weight:700; color:var(--blue-dark); }
  .link{ font-size:13px; font-weight:600; color:var(--blue); background:none; border:none; cursor:pointer; padding:0; }
  .link:hover{ text-decoration:underline; }
  .rowbtn{ font-size:12.5px; font-weight:600; color:var(--blue-deep); background:var(--surface);
    border:1px solid var(--line); border-radius:8px; padding:6px 11px; cursor:pointer; }
  .rowbtn:hover{ border-color:var(--cyan); color:var(--blue); }

  .tag{ font-size:11px; font-weight:600; border-radius:999px; padding:3px 9px; display:inline-block; }
  .tag.pendente{ background:var(--warn-bg); color:#854F0B; }
  .tag.aprovado{ background:var(--ok-bg); color:#0F6E56; }
  .tag.recusado{ background:var(--bad-bg); color:var(--bad); }

  .sub{ padding:15px 18px; border-bottom:1px solid var(--line); }
  .sub:last-child{ border-bottom:none; }
  .sub-top{ display:flex; align-items:center; gap:9px; flex-wrap:wrap; margin-bottom:8px; }
  .sub-top .who{ font-weight:600; font-size:14.5px; }
  .sub-top .when{ font-size:12px; color:var(--muted); margin-left:auto; }
  .sub .what{ font-size:13.5px; color:var(--muted); margin-bottom:9px; }
  .sub-data{ background:var(--paper); border:1px solid var(--line); border-radius:9px; padding:11px 13px;
    font-size:13px; line-height:1.6; white-space:pre-wrap; margin-bottom:10px; }
  .sub img{ max-width:100%; max-height:340px; border-radius:9px; border:1px solid var(--line); display:block; margin-bottom:10px; }
  .acts{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .acts .ok{ background:var(--ok); color:#fff; border:none; border-radius:9px; padding:8px 15px; font-size:13px; font-weight:600; cursor:pointer; }
  .acts .no{ background:var(--surface); color:var(--bad); border:1px solid #E7BEBE; border-radius:9px; padding:8px 15px; font-size:13px; font-weight:600; cursor:pointer; }
  .acts input{ flex:1; min-width:150px; font-size:13px; padding:8px 11px; }

  /* documentos */
  .filters{ display:flex; gap:9px; flex-wrap:wrap; padding:13px 18px; border-bottom:1px solid var(--line); background:var(--paper); }
  .filters input,.filters select{ font-size:13.5px; padding:8px 11px; width:auto; flex:1; min-width:140px; }
  .docs{ display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:13px; padding:16px 18px; }
  .doc{ border:1px solid var(--line); border-radius:11px; overflow:hidden; background:var(--surface); }
  .doc .thumb{ height:120px; background:var(--paper); display:grid; place-items:center; cursor:pointer; overflow:hidden; }
  .doc .thumb img{ width:100%; height:100%; object-fit:cover; }
  .doc .thumb .ph{ font-size:12px; color:var(--muted); text-align:center; padding:10px; }
  .doc .meta{ padding:10px 12px; }
  .doc .meta .n{ font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .doc .meta .m{ font-size:11.5px; color:var(--muted); margin-top:2px; line-height:1.4; }
  .doc .meta .b{ margin-top:7px; display:flex; gap:6px; align-items:center; justify-content:space-between; }

  /* ficha */
  .ficha-head{ display:flex; align-items:center; gap:14px; padding:18px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .ficha-head .bg{ width:52px; height:52px; border-radius:50%; background:var(--orb); color:#fff;
    display:grid; place-items:center; font-family:'Archivo',sans-serif; font-weight:800; font-size:20px; }
  .ficha-head .nm{ font-family:'Archivo',sans-serif; font-weight:800; font-size:18px; color:var(--blue-dark); }
  .ficha-head .mt{ font-size:12.5px; color:var(--muted); margin-top:2px; }
  .ficha-head .st{ margin-left:auto; display:flex; gap:18px; text-align:right; flex-wrap:wrap; }
  .ficha-head .st div .k{ font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:600; }
  .ficha-head .st div .v{ font-family:'Archivo',sans-serif; font-weight:700; font-size:17px; color:var(--blue-dark); }
  .mrow{ padding:12px 18px; border-bottom:1px solid var(--line); }
  .mrow:last-child{ border-bottom:none; }
  .mrow-top{ display:flex; align-items:center; gap:10px; }
  .mi{ width:24px; height:24px; border-radius:50%; flex:0 0 auto; display:grid; place-items:center;
    font-size:12px; font-weight:700; border:1.5px solid var(--line); color:var(--muted); background:var(--paper); }
  .mi.done{ background:var(--ok-bg); border-color:var(--ok); color:var(--ok); }
  .mi.wait{ background:var(--warn-bg); border-color:var(--warn); color:var(--warn); }
  .mrow .t{ flex:1; font-size:14px; font-weight:500; }
  .mrow .t.off{ color:var(--muted); font-weight:400; }
  .mrow .p{ font-size:12px; font-weight:700; color:var(--blue); }
  .mdet{ margin:10px 0 0 34px; }
  .mdet .env{ background:var(--paper); border:1px solid var(--line); border-radius:9px; padding:10px 12px;
    font-size:12.5px; line-height:1.6; margin-bottom:7px; white-space:pre-wrap; }
  .mdet .env .eh{ display:flex; gap:8px; align-items:center; margin-bottom:6px; font-size:11.5px; color:var(--muted); }
  .trackname{ padding:11px 18px; background:var(--paper); font-family:'Archivo',sans-serif; font-weight:700;
    font-size:12.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--blue-deep); border-bottom:1px solid var(--line); }

  .msg{ margin-bottom:13px; }
  .msg .r{ font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; margin-bottom:4px; }
  .msg.user .r{ color:var(--blue); } .msg.assistant .r{ color:var(--muted); }
  .msg .bd{ font-size:14px; line-height:1.6; white-space:pre-wrap; background:var(--paper);
    border:1px solid var(--line); border-radius:9px; padding:11px 13px; }
  .msg.user .bd{ background:#EAF4FB; border-color:#CFE6F5; }

  .prizerow{ display:grid; grid-template-columns:44px 1fr 1.4fr; gap:10px; align-items:start;
    padding:13px 18px; border-bottom:1px solid var(--line); }
  .prizerow .lv{ width:34px; height:34px; border-radius:9px; background:var(--orb); color:#fff;
    display:grid; place-items:center; font-weight:700; font-size:14px; margin-top:22px; }
  .empty{ padding:34px 18px; text-align:center; color:var(--muted); font-size:14px; }
  .note{ font-size:12px; color:var(--muted); padding:12px 18px; background:var(--paper); line-height:1.5; }
  .back{ font-size:13px; font-weight:600; color:var(--blue); background:none; border:none; cursor:pointer; padding:0 0 12px; }
  .veil{ position:fixed; inset:0; background:rgba(0,32,54,.6); display:none; align-items:center; justify-content:center; padding:20px; z-index:60; }
  .veil.on{ display:flex; }
  .veil img{ max-width:100%; max-height:88vh; border-radius:12px; }

  /* menu de exportação */
  .csvbox{ background:var(--surface); border-radius:16px; width:100%; max-width:380px; overflow:hidden;
    box-shadow:0 20px 50px rgba(0,32,54,.35); }
  .csvh{ padding:16px 20px; font-family:'Archivo',sans-serif; font-weight:700; font-size:15px;
    color:var(--blue-dark); border-bottom:1px solid var(--line); }
  .csvi{ display:block; width:100%; text-align:left; padding:13px 20px; border:none; background:none;
    border-bottom:1px solid var(--line); font-size:14px; color:var(--ink); cursor:pointer; }
  .csvi:hover{ background:#F3F9FD; color:var(--blue-deep); }
  .csvi.all{ font-weight:600; color:var(--blue-deep); }
  .csvi.cancel{ color:var(--muted); border-bottom:none; text-align:center; }

  /* seleção de colaboradores */
  .chk{ display:flex; align-items:center; gap:8px; font-size:14px; font-weight:400;
    color:var(--ink); cursor:pointer; margin:0; padding:7px 0; }
  .chk input{ width:auto; flex:0 0 auto; }
  .chk .mm{ font-size:12px; color:var(--muted); }
  .whobox{ border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .whotools{ display:flex; gap:8px; padding:9px 12px; background:var(--paper); border-bottom:1px solid var(--line); }
  .wholist{ max-height:190px; overflow-y:auto; padding:6px 14px; }

  /* construtor de quiz */
  .callout{ background:#EAF4FB; border:1px solid #CFE6F5; border-radius:10px; padding:12px 14px;
    font-size:13px; color:var(--blue-deep); line-height:1.5; margin:16px 0 12px; }
  .qbuilder{ border:1px solid var(--line); border-radius:11px; padding:14px; margin-bottom:12px; background:var(--paper); }
  .qb-head{ display:flex; justify-content:space-between; align-items:center; font-size:12.5px; font-weight:700;
    color:var(--blue-deep); text-transform:uppercase; letter-spacing:.04em; margin-bottom:9px; }
  .qb-del{ background:none; border:none; color:var(--bad); font-size:12px; font-weight:600; cursor:pointer; text-transform:none; letter-spacing:0; }
  .qb-q{ margin-bottom:10px; }
  .qb-opts{ display:grid; gap:7px; }
  .qb-opt{ display:flex; align-items:center; gap:9px; }
  .qb-opt input[type=radio]{ width:auto; flex:0 0 auto; }
  .qb-opt .qb-o{ flex:1; padding:8px 11px; font-size:13.5px; }
  .qb-hint{ font-size:12px; color:var(--muted); margin-top:8px; }
</style>
</head>
<body>

<div class="topbar">
  <span class="dot"></span>
  <h1>Painel do gestor</h1>
  <span class="sub">Programa de Saúde Financeira · Marco Souza × Engeval</span>
</div>

<div class="wrap">

  <section class="gate" id="gate">
    <h2>Acesso restrito</h2>
    <p>Informe a senha do gestor para abrir o painel.</p>
    <label for="pw">Senha</label>
    <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password" />
    <button class="btn wide" id="enter" type="button">Entrar</button>
    <div class="err" id="gErr"></div>
  </section>

  <section id="dash" style="display:none">
    <div class="nav">
      <button type="button" class="on" data-v="dash">Dashboard</button>
      <button type="button" data-v="pessoas">Colaboradores</button>
      <button type="button" data-v="docs">Documentos</button>
      <button type="button" data-v="fila">Aprovações <span class="pill" id="pill" style="display:none">0</span></button>
      <button type="button" data-v="especiais">Missões especiais</button>
      <button type="button" data-v="aulas">Aulas</button>
      <button type="button" data-v="premios">Prêmios</button>
      <span class="spacer"></span>
      <button type="button" id="csv">⬇ Exportar CSV</button>
      <button type="button" id="reload">Atualizar</button>
      <button type="button" id="exit">Sair</button>
    </div>

    <div id="vDash"></div>
    <div id="vPessoas" style="display:none"></div>
    <div id="vDocs" style="display:none"></div>
    <div id="vFila" style="display:none"></div>
    <div id="vEspeciais" style="display:none"></div>
    <div id="vAulas" style="display:none"></div>
    <div id="vPremios" style="display:none"></div>
  </section>
</div>

<div class="veil" id="lightbox"><img id="lbImg" alt="Documento"></div>
<div class="veil" id="csvMenu"></div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  let key='', dash=null, over=null, subs=[], files=[], prizes=[], custom=[], colabs=[], lessons=[];

  const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fmt = ts => ts ? new Date(ts).toLocaleString('pt-BR') : '—';
  const fmtD = ts => ts ? new Date(ts).toLocaleDateString('pt-BR') : '—';

  async function api(qs, opts={}){
    const r = await fetch('/api/admin?'+qs, { ...opts, headers:{ 'Content-Type':'application/json', 'x-admin-key':key } });
    const j = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(j.error || 'Erro.');
    return j;
  }

  /* ---------- login ---------- */
  async function login(){
    key = $('pw').value.trim(); $('gErr').textContent='';
    if(!key){ $('gErr').textContent='Digite a senha.'; return; }
    try{ await loadAll(); $('gate').style.display='none'; $('dash').style.display='block'; }
    catch(err){ $('gErr').textContent = err.message; }
  }
  $('enter').onclick = login;
  $('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
  $('exit').onclick = ()=>{ key=''; $('pw').value=''; $('dash').style.display='none'; $('gate').style.display='block'; };
  $('reload').onclick = ()=> loadAll().catch(e=>alert(e.message));

  async function loadAll(){
    const [d, o, s, f, p, c, l] = await Promise.all([
      api('action=dashboard'), api('action=overview'), api('action=submissions'),
      api('action=files'), api('action=prizes'), api('action=custom'), api('action=lessons')
    ]);
    dash=d; over=o.ranking||[]; subs=s.submissions||[]; files=f.files||[]; prizes=p.prizes||[];
    custom=c.missions||[]; colabs=c.colaboradores||[]; lessons=l.lessons||[];
    renderDash(); renderPessoas(); renderDocs(); renderFila(); renderEspeciais(); renderAulas(); renderPrizes();
    const pend = dash.resumo.comprovantesPendentes;
    const pill = $('pill');
    if(pend){ pill.style.display='inline-block'; pill.textContent=pend; } else pill.style.display='none';
  }

  /* ======================= DASHBOARD ======================= */
  function bar(label, value, pct, cls){
    return '<div class="brow"><div class="btop"><span class="bl">'+esc(label)+'</span>'+
      '<span class="bv">'+esc(value)+'</span></div>'+
      '<div class="track '+(cls||'')+'"><i style="width:'+Math.max(pct,2)+'%"></i></div></div>';
  }

  function renderDash(){
    const r = dash.resumo, e = dash.engajamento, c = dash.conquistas;

    let h = '<div class="cards">'+
      '<div class="card"><div class="k">Colaboradores</div><div class="v">'+r.colaboradores+'</div>'+
        '<div class="s">'+e.ativos+' ativos ('+e.taxaAtivos+'%)</div></div>'+
      '<div class="card"><div class="k">Missões concluídas</div><div class="v">'+r.missoesConcluidas+'</div>'+
        '<div class="s">no programa todo</div></div>'+
      '<div class="card"><div class="k">Pontos distribuídos</div><div class="v">'+r.pontosTotais+'</div>'+
        '<div class="s">média de '+e.mediaPontos+' por pessoa</div></div>'+
      '<div class="card'+(r.comprovantesPendentes?' alert':'')+'"><div class="k">Aprovações pendentes</div>'+
        '<div class="v">'+r.comprovantesPendentes+'</div><div class="s">'+r.documentos+' documentos no total</div></div>'+
      '<div class="card good"><div class="k">Maior sequência</div><div class="v">'+e.maiorSequencia+'</div>'+
        '<div class="s">'+e.comSequencia+' pessoas em ritmo</div></div>'+
      '</div>';

    // Conquistas de impacto real
    h += '<div class="panel"><div class="panel-head"><strong>Conquistas do programa</strong>'+
      '<span class="hint">O que realmente mudou na vida das pessoas</span></div><div class="cards" style="padding:16px 18px;margin:0">'+
      '<div class="card good"><div class="k">Dívidas quitadas</div><div class="v">'+c.dividasQuitadas+'</div></div>'+

  function drawDocs(){
    const q = ($('dq').value||'').toLowerCase();
    const fm = $('dm').value, fs = $('ds').value;
    const list = files.filter(f =>
      (!q || (f.nome||'').toLowerCase().includes(q) || String(f.matricula).includes(q)) &&
      (!fm || f.missionTitle===fm) && (!fs || f.status===fs));

    $('docGrid').innerHTML = list.length ? list.map(f=>{
      const pdf = (f.mime||'').includes('pdf');
      return '<div class="doc"><div class="thumb" data-open="'+esc(f.fileId)+'" data-pdf="'+pdf+'" id="th_'+esc(f.fileId)+'">'+
        '<div class="ph">'+(pdf?'📄 PDF':'Clique para carregar')+'</div></div>'+
        '<div class="meta"><div class="n">'+esc(f.nome||f.matricula)+'</div>'+

        '<div class="b"><span class="tag '+f.status+'">'+f.status+'</span>'+
        '<button class="link" data-dl="'+esc(f.fileId)+'" data-name="'+esc(f.fileName)+'">Baixar</button></div>'+
        '</div></div>';
    }).join('') : '<div class="empty" style="grid-column:1/-1">Nenhum documento com esses filtros.</div>';

    document.querySelectorAll('[data-open]').forEach(t=> t.onclick = ()=> viewDoc(t.dataset.open, t));
    document.querySelectorAll('[data-dl]').forEach(b=> b.onclick = ()=> download(b.dataset.dl, b.dataset.name));
  }

  const cache = {};
  async function fetchDoc(fileId){
    if(cache[fileId]) return cache[fileId];
    const j = await api('action=file&id='+encodeURIComponent(fileId));
    cache[fileId] = j.file;
    return j.file;
  }
  async function viewDoc(fileId, el){
    try{
      const data = await fetchDoc(fileId);
      if(data.startsWith('data:application/pdf')){ window.open(data, '_blank'); return; }
      // miniatura na grade
      const th = $('th_'+fileId);
      if(th && el === th){ th.innerHTML = '<img src="'+data+'" alt="Documento">'; th.onclick = ()=> lightbox(data); return; }
      lightbox(data);
    }catch(err){ alert(err.message); }
  }
  function lightbox(src){ $('lbImg').src = src; $('lightbox').classList.add('on'); }
  $('lightbox').onclick = ()=> $('lightbox').classList.remove('on');

  async function download(fileId, name){
    try{
      const data = await fetchDoc(fileId);
      const a = document.createElement('a');
      a.href = data; a.download = name || 'comprovante';
      document.body.appendChild(a); a.click(); a.remove();
    }catch(err){ alert(err.message); }
  }

  function addQuestion(){
    if(quizCount >= 5){ return; }
    const i = quizCount++;
    const div = document.createElement('div');
    div.className = 'qbuilder'; div.dataset.q = i;
    div.innerHTML = '<div class="qb-head"><span>Pergunta '+(i+1)+'</span>'+
      '<button class="qb-del" type="button">remover</button></div>'+
      '<input type="text" class="qb-q" placeholder="Enunciado da pergunta">'+
      '<div class="qb-opts">'+
        [0,1,2,3].map(j=>'<label class="qb-opt"><input type="radio" name="correct'+i+'" value="'+j+'"'+(j===0?' checked':'')+'>'+
          '<input type="text" class="qb-o" placeholder="Alternativa '+(j+1)+(j>1?' (opcional)':'')+'"></label>').join('')+
      '</div><div class="qb-hint">Marque o círculo da alternativa correta.</div>';
    $('quizList').appendChild(div);
    div.querySelector('.qb-del').onclick = ()=>{ div.remove(); };
  }

  function coletarQuiz(){
    const quiz = [];
    let erro = null;
    document.querySelectorAll('.qbuilder').forEach(div=>{
      const q = div.querySelector('.qb-q').value.trim();
      const opts = [...div.querySelectorAll('.qb-o')].map(o=>o.value.trim());
      // considera as alternativas preenchidas, do início até a última não-vazia
      let last = -1;
      opts.forEach((o,idx)=>{ if(o) last = idx; });
      const usadas = opts.slice(0, last + 1);
      if(!q && last < 0) return; // pergunta em branco: ignora
      if(!q){ erro = 'Há uma pergunta sem enunciado.'; return; }
      if(usadas.length < 2){ erro = 'Cada pergunta precisa de ao menos 2 alternativas.'; return; }
      if(usadas.some(o=>!o)){ erro = 'Preencha as alternativas em ordem, sem deixar buracos.'; return; }
      const i = div.dataset.q;
      const answer = parseInt((div.querySelector('input[name="correct'+i+'"]:checked')||{}).value || '0', 10);
      if(answer >= usadas.length){ erro = 'A alternativa marcada como correta está vazia.'; return; }
      quiz.push({ q, options: usadas, answer });
    });
    return { quiz, erro };
  }

  async function salvarAula(){
    const msg = $('lMsg'); msg.textContent='';
    if(!$('lTitulo').value.trim()){ msg.textContent='Dê um título à aula.'; return; }
    if(!$('lVideo').value.trim()){ msg.textContent='Cole o link do vídeo.'; return; }
    const { quiz, erro } = coletarQuiz();
    if(erro){ msg.textContent = erro; return; }
    const b = $('lSave'); b.disabled=true; b.textContent='Publicando…';
    try{
      const r = await api('action=lesson', { method:'POST', body: JSON.stringify({
        titulo: $('lTitulo').value, video: $('lVideo').value, descricao: $('lDesc').value,
        trilha: $('lTrilha').value, pontos: $('lPontos').value, quiz })});
      if(!r.ok){ throw new Error(r.error||'Erro.'); }
      await loadAll();
      document.querySelector('[data-v=aulas]').click();
    }catch(err){ msg.textContent = err.message; b.disabled=false; b.textContent='Publicar aula'; }
  }

  async function excluirAula(id){
    if(!confirm('Excluir esta aula? Quem já concluiu mantém os pontos.')) return;
    try{ await api('action=lessonDelete', { method:'POST', body: JSON.stringify({ id }) }); await loadAll(); document.querySelector('[data-v=aulas]').click(); }
    catch(err){ alert(err.message); }
  }

  /* ======================= EXPORTAR CSV ======================= */
  // Usa ponto-e-vírgula (padrão do Excel em pt-BR) e BOM, para acentos não quebrarem.
  function toCSV(rows){
    const cell = v => {
      const t = String(v == null ? '' : v).replace(/"/g,'""').replace(/\r?\n/g,' ');
      return '"'+t+'"';
    };
    return rows.map(r => r.map(cell).join(';')).join('\r\n');
  }
  function baixarCSV(nome, rows){
    const blob = new Blob(['\ufeff' + toCSV(rows)], { type:'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = nome + '_' + new Date().toISOString().slice(0,10) + '.csv';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 2000);
  }

  function csvColaboradores(){
    const rows = [['Posicao','Nome','Matricula','Nivel','Nome do nivel','Pontos','Missoes concluidas','Sequencia','Ultimo check-in','Cadastro']];
    over.forEach((r,i)=> rows.push([ i+1, r.nome, r.matricula, r.level.level, r.level.name,
      r.points, r.missoes, r.streak, fmtD(r.lastCheckin), fmtD(r.createdAt) ]));
    return rows;
  }
  function csvMissoes(){
    const rows = [['Trilha','Missao','Pontos','Tipo','Concluiram','% do total','Vezes realizada']];
    dash.trilhas.forEach(t => t.missoes.forEach(m =>
      rows.push([ t.name, m.title, m.points, m.type, m.concluiram, m.pct+'%', m.vezes ])));
    custom.forEach(m => rows.push([ 'Missoes especiais', m.title, m.points, m.type,
      m.concluidos, m.totalAlvos ? Math.round(m.concluidos/m.totalAlvos*100)+'%' : '—', m.concluidos ]));
    lessons.forEach(l => rows.push([ 'Aulas', l.titulo, l.pontos, 'video',
      l.assistiram, l.total ? Math.round(l.assistiram/l.total*100)+'%' : '—', l.assistiram ]));
    return rows;
  }
  function csvEnvios(){
    const rows = [['Data','Matricula','Nome','Missao','Tipo','Situacao','Pontos','Tem documento','Respostas','Observacao']];
    subs.forEach(s=>{
      const dados = Object.entries(s.data||{}).filter(([k])=>k!=='answers')
        .map(([k,v])=>k+': '+v).join(' | ');
      rows.push([ fmt(s.createdAt), s.matricula, s.nome, s.missionTitle, s.type,
        s.status, s.points||0, s.fileId?'sim':'nao', dados, s.note||'' ]);
    });
    return rows;
  }
  function csvDocumentos(){
    const rows = [['Data','Matricula','Nome','Missao','Arquivo','Tipo','Situacao']];
    files.forEach(f=> rows.push([ fmt(f.createdAt), f.matricula, f.nome, f.missionTitle,
      f.fileName, f.mime, f.status ]));
    return rows;
  }
  function csvConquistas(){
    const c = dash.conquistas, e = dash.engajamento, r = dash.resumo;
    const rows = [['Indicador','Valor']];
    rows.push(['Colaboradores', r.colaboradores]);
    rows.push(['Colaboradores ativos', e.ativos]);
    rows.push(['Taxa de ativos', e.taxaAtivos+'%']);
    rows.push(['Pontos distribuidos', r.pontosTotais]);
    rows.push(['Media de pontos', e.mediaPontos]);
    rows.push(['Missoes concluidas', r.missoesConcluidas]);
    rows.push(['Dividas quitadas', c.dividasQuitadas]);
    rows.push(['Reservas mantidas', c.reservasMantidas]);
    rows.push(['Objetivos alcancados', c.objetivosAlcancados]);
    rows.push(['Orcamentos montados', c.orcamentosMontados]);
    rows.push(['Planos de quitacao', c.planosQuitacao]);
    rows.push(['Check-ins semanais', c.checkins]);
    rows.push(['Maior sequencia', e.maiorSequencia]);
    rows.push(['Comprovantes pendentes', r.comprovantesPendentes]);
    rows.push([]);
    rows.push(['Nivel','Nome','Colaboradores','% do total']);
    dash.porNivel.forEach(n=> rows.push([ n.level, n.name, n.total, n.pct+'%' ]));
    return rows;
  }

  $('csv').onclick = ()=>{
    const menu = [
      ['Colaboradores (ranking)', 'colaboradores', csvColaboradores],
      ['Missões (conclusão)', 'missoes', csvMissoes],
      ['Envios (tudo o que foi respondido)', 'envios', csvEnvios],
      ['Documentos enviados', 'documentos', csvDocumentos],
      ['Indicadores e conquistas', 'indicadores', csvConquistas],
    ];
    const box = $('csvMenu');
    box.innerHTML = '<div class="csvbox"><div class="csvh">Exportar para CSV</div>'+
      menu.map((m,i)=>'<button class="csvi" data-c="'+i+'">'+m[0]+'</button>').join('')+
      '<button class="csvi all" data-c="all">Baixar todos os arquivos</button>'+
      '<button class="csvi cancel" data-c="x">Cancelar</button></div>';
    box.classList.add('on');
    box.querySelectorAll('[data-c]').forEach(b=>{
      b.onclick = ()=>{
        const v = b.dataset.c;
        if(v === 'x'){ box.classList.remove('on'); return; }
        if(v === 'all'){ menu.forEach((m,i)=> setTimeout(()=> baixarCSV(m[1], m[2]()), i*350)); }
        else { const m = menu[parseInt(v,10)]; baixarCSV(m[1], m[2]()); }
        box.classList.remove('on');
      };
    });
  };

  /* ======================= MISSÕES ESPECIAIS ======================= */
  function renderEspeciais(){
    const opts = colabs.map(c =>
      '<label class="chk"><input type="checkbox" class="who" value="'+esc(c.matricula)+'"> '+
      esc(c.nome)+' <span class="mm">'+esc(c.matricula)+'</span></label>').join('')
      || '<div class="empty" style="padding:12px">Nenhum colaborador cadastrado ainda.</div>';

    let h = '<div class="panel"><div class="panel-head"><strong>Criar missão especial</strong>'+
      '<span class="hint">Vale apenas para os colaboradores que você escolher.</span></div><div class="pbody">'+
      '<div class="grid2">'+
        '<div><label for="cTitle">Título da missão</label>'+
        '<input type="text" id="cTitle" placeholder="Ex.: Renegociar a dívida do consignado"></div>'+
        '<div><label for="cPoints">Pontos</label>'+
        '<input type="number" id="cPoints" value="100" min="0" max="1000"></div>'+
      '</div>'+
      '<div style="margin-top:12px"><label for="cDesc">Descrição</label>'+
      '<textarea id="cDesc" placeholder="Explique o que a pessoa precisa fazer"></textarea></div>'+
      '<div class="grid2" style="margin-top:12px">'+
        '<div><label for="cType">Como será comprovada</label>'+
        '<select id="cType">'+
          '<option value="form">Relato escrito (o colaborador descreve)</option>'+
          '<option value="proof">Comprovante (foto/PDF, você aprova)</option>'+
        '</select></div>'+
        '<div><label for="cHint">Instrução ao colaborador</label>'+
        '<input type="text" id="cHint" placeholder="Ex.: envie o acordo assinado"></div>'+
      '</div>'+
      '<label class="chk" style="margin-top:12px"><input type="checkbox" id="cRep"> Pode ser cumprida mais de uma vez</label>'+
      '<div style="margin-top:14px"><label>Para quem vale esta missão</label>'+
        '<div class="whobox">'+
          '<div class="whotools"><button class="rowbtn" id="selAll" type="button">Selecionar todos</button>'+
          '<button class="rowbtn" id="selNone" type="button">Limpar</button></div>'+
          '<div class="wholist">'+opts+'</div>'+
        '</div></div>'+
      '<button class="btn" id="cSave" type="button" style="margin-top:14px">Criar missão</button>'+
      '<span id="cMsg" style="margin-left:12px;font-size:13px;color:var(--muted)"></span>'+
      '</div></div>';

    h += '<div class="panel"><div class="panel-head"><strong>Missões especiais criadas</strong>'+
      '<span class="hint">'+custom.length+' missão(ões)</span></div>'+
      (custom.length
        ? '<table><thead><tr><th>Missão</th><th>Pontos</th><th>Tipo</th><th>Para quem</th><th>Concluíram</th><th></th></tr></thead><tbody>'+
          custom.map(m=>{
            const nomes = (m.assignees||[]).map(a=>{
              const c = colabs.find(x=>x.matricula===a);
              return c ? c.nome : a;
            });
            const lista = nomes.length>3 ? nomes.slice(0,3).join(', ')+' +'+(nomes.length-3) : nomes.join(', ');
            return '<tr><td><b>'+esc(m.title)+'</b>'+(m.desc?'<div style="font-size:12.5px;color:var(--muted);margin-top:2px">'+esc(m.desc)+'</div>':'')+'</td>'+
              '<td class="pts">+'+m.points+'</td>'+
              '<td><span class="tag '+(m.type==='proof'?'pendente':'aprovado')+'">'+(m.type==='proof'?'comprovante':'relato')+'</span></td>'+
              '<td style="font-size:13px">'+esc(lista)+'</td>'+
              '<td>'+m.concluidos+'/'+m.totalAlvos+'</td>'+
              '<td><button class="rowbtn" data-del="'+esc(m.id)+'">Excluir</button></td></tr>';
          }).join('')+'</tbody></table>'
        : '<div class="empty">Nenhuma missão especial criada ainda.</div>')+
      '</div>';

    $('vEspeciais').innerHTML = h;

    $('selAll').onclick = ()=> document.querySelectorAll('.who').forEach(c=>c.checked=true);
    $('selNone').onclick = ()=> document.querySelectorAll('.who').forEach(c=>c.checked=false);
    $('cSave').onclick = criarMissao;
    document.querySelectorAll('[data-del]').forEach(b=> b.onclick = ()=> excluirMissao(b.dataset.del));
  }

  async function criarMissao(){
    const assignees = [...document.querySelectorAll('.who:checked')].map(c=>c.value);
    const b = $('cSave'), msg = $('cMsg');
    msg.textContent = '';
    if(!$('cTitle').value.trim()){ msg.textContent='Dê um título à missão.'; return; }
    if(!assignees.length){ msg.textContent='Escolha ao menos um colaborador.'; return; }

    b.disabled = true; b.textContent = 'Criando…';
    try{
      const tipo = $('cType').value;
      await api('action=custom', { method:'POST', body: JSON.stringify({
        title: $('cTitle').value, desc: $('cDesc').value,
        points: $('cPoints').value, type: tipo,
        repeatable: $('cRep').checked, assignees,
        proofHint: tipo==='proof' ? $('cHint').value : '',
        fieldLabel: tipo==='form' ? ($('cHint').value || 'Conte como você cumpriu esta missão') : '',
      })});
      await loadAll();
      msg.textContent = 'Missão criada ✓';
    }catch(err){ msg.textContent = err.message; }
    finally{ b.disabled=false; b.textContent='Criar missão'; }
  }

  async function excluirMissao(id){
    if(!confirm('Excluir esta missão especial? Os pontos já concedidos permanecem.')) return;
    try{
      await api('action=customDelete', { method:'POST', body: JSON.stringify({ id }) });
      await loadAll();
    }catch(err){ alert(err.message); }
  }

  /* ======================= PRÊMIOS ======================= */
  function renderPrizes(){
    const byLevel = {}; prizes.forEach(p=> byLevel[p.level]=p);
    let rows='';
    for(let lv=2; lv<=5; lv++){
      const p = byLevel[lv] || {};
      rows += '<div class="prizerow"><div class="lv">'+lv+'</div>'+
        '<div><label for="pt_'+lv+'">Prêmio do nível '+lv+'</label>'+
        '<input type="text" id="pt_'+lv+'" value="'+esc(p.titulo||'')+'" placeholder="Ex.: Vale-compras"></div>'+
        '<div><label for="pd_'+lv+'">Descrição / regras</label>'+
        '<textarea id="pd_'+lv+'" placeholder="Como o colaborador recebe">'+esc(p.descricao||'')+'</textarea></div></div>';
    }
    $('vPremios').innerHTML = '<div class="panel"><div class="panel-head"><strong>Cadastro de prêmios</strong>'+
      '<span class="hint">Marcos garantidos: bateu o nível, ganhou.</span></div>'+ rows +
      '<div class="note">Deixe em branco os níveis ainda não definidos — o colaborador vê apenas os preenchidos. O nível 1 é o ponto de partida e não tem prêmio.</div>'+
      '<div style="padding:16px 18px"><button class="btn" id="savePrizes" type="button">Salvar prêmios</button></div></div>';
    $('savePrizes').onclick = savePrizes;
  }

  async function savePrizes(){
    const list=[];
    for(let lv=2; lv<=5; lv++){
      const t=$('pt_'+lv).value.trim(), d=$('pd_'+lv).value.trim();
      if(t||d) list.push({ level:lv, titulo:t, descricao:d, ativo:true });
    }
    const b=$('savePrizes'); b.disabled=true; b.textContent='Salvando…';
    try{
      await api('action=prizes', { method:'POST', body: JSON.stringify({ prizes:list }) });
      await loadAll();
      b.textContent='Salvo ✓'; setTimeout(()=>{ b.textContent='Salvar prêmios'; b.disabled=false; },1500);
    }catch(err){ alert(err.message); b.disabled=false; b.textContent='Salvar prêmios'; }
  }

  /* ---------- navegação ---------- */
  document.querySelectorAll('.nav [data-v]').forEach(b=>{
    b.onclick = ()=>{
      document.querySelectorAll('.nav [data-v]').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      const v = b.dataset.v;
      $('vDash').style.display    = v==='dash'    ? 'block':'none';
      $('vPessoas').style.display = v==='pessoas' ? 'block':'none';
      $('vDocs').style.display    = v==='docs'    ? 'block':'none';
      $('vFila').style.display    = v==='fila'    ? 'block':'none';
      $('vEspeciais').style.display = v==='especiais' ? 'block':'none';
      $('vAulas').style.display   = v==='aulas'   ? 'block':'none';
      $('vPremios').style.display = v==='premios' ? 'block':'none';
      if(v==='pessoas') renderPessoas();
    };
  });

  $('pw').focus();
})();
</script>
