<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bússola — Orientação de Finanças Pessoais</title>
<meta name="description" content="Ambiente de educação e planejamento financeiro pessoal. Uma parceria com a Engeval." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EEF3F8;
    --surface:#FFFFFF;
    --blue:#0078C0;          /* azul primário Engeval */
    --blue-600:#0A6FB0;
    --blue-deep:#005B92;
    --blue-dark:#00406B;     /* azul profundo — títulos / hero */
    --cyan:#309CD8;
    --cyan-light:#60B4E4;
    --ink:#16232E;
    --muted:#5B6E7B;
    --line:#D9E4EC;
    --shadow:0 1px 2px rgba(0,64,107,.06), 0 10px 28px rgba(0,64,107,.07);
    --shadow-sm:0 1px 2px rgba(0,64,107,.08);
    --radius:16px;
    /* esfera azul do logotipo, reaproveitada como assinatura visual */
    --orb:radial-gradient(circle at 32% 28%, #86C7EC 0%, #1E8BCE 42%, #0078C0 66%, #005B92 100%);
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column;
    height:100dvh;
  }

  /* ---------- Header ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:16px 20px;
    padding:12px clamp(16px,4vw,32px);
    background:var(--surface);
    border-bottom:1px solid var(--line);
    box-shadow:var(--shadow-sm);
    flex:0 0 auto; flex-wrap:wrap;
  }
  /* co-branding: marca pessoal + logotipo Engeval */
  .cobrand{ display:flex; align-items:center; gap:14px; min-height:44px; }
  .cobrand .personal{ display:flex; flex-direction:column; line-height:1.05; }
  .personal-name{
    font-family:'Archivo',sans-serif; font-weight:800; font-size:20px;
    color:var(--blue-dark); letter-spacing:-.01em;
  }
  .partner{ display:flex; align-items:center; gap:8px; margin-top:3px; }
  .partner-label{
    font-size:10.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted);
  }
  .engeval-logo{ height:19px; width:auto; display:block; }
  .divider{ width:1px; align-self:stretch; background:var(--line); margin:4px 0; }

  .actions{ display:flex; align-items:center; gap:14px; }
  .tag{ font-size:12.5px; color:var(--muted); letter-spacing:.01em; }
  .newchat{
    font:inherit; font-size:13px; font-weight:600;
    color:var(--blue-deep); background:var(--surface);
    border:1px solid var(--line); border-radius:999px;
    padding:8px 15px; cursor:pointer; transition:background .15s,border-color .15s,color .15s;
  }
  .newchat:hover{ background:#F0F7FC; border-color:var(--cyan); color:var(--blue); }
  .newchat:focus-visible{ outline:2px solid var(--blue); outline-offset:2px; }
  @media (max-width:620px){ .tag{ display:none; } }

  /* ---------- Chat area ---------- */
  .stage{ flex:1 1 auto; overflow-y:auto; scroll-behavior:smooth; }
  .stage-inner{
    max-width:760px; margin:0 auto;
    padding:clamp(20px,4vw,40px) clamp(16px,4vw,24px) 24px;
  }

  /* Welcome / empty state */
  .welcome{ padding-top:clamp(12px,6vh,60px); }
  .welcome .eyebrow{
    display:inline-flex; align-items:center; gap:9px;
    font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
    color:var(--blue-deep); margin-bottom:16px;
  }
  .welcome .eyebrow .orb{
    width:13px; height:13px; border-radius:50%; background:var(--orb);
    box-shadow:0 1px 4px rgba(0,120,192,.4);
  }
  .welcome h1{
    font-family:'Archivo',sans-serif; font-weight:800;
    font-size:clamp(28px,5.5vw,44px); line-height:1.08; margin:0 0 14px;
    color:var(--blue-dark); letter-spacing:-.015em;
  }
  .welcome h1 em{ font-style:normal; color:var(--blue); }
  .welcome p{ font-size:16px; color:var(--muted); margin:0 0 28px; max-width:52ch; line-height:1.55; }
  .suggest-label{
    font-size:12px; font-weight:700; letter-spacing:.09em; text-transform:uppercase;
    color:var(--muted); margin:0 0 12px;
  }
  .chips{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:560px){ .chips{ grid-template-columns:1fr; } }
  .chip{
    text-align:left; font:inherit; font-size:14.5px; color:var(--ink);
    background:var(--surface); border:1px solid var(--line); border-radius:12px;
    padding:14px 16px; cursor:pointer; line-height:1.4;
    transition:border-color .15s, box-shadow .15s, transform .05s;
    display:flex; align-items:center; gap:11px;
  }
  .chip::before{
    content:""; flex:0 0 auto; width:9px; height:9px; border-radius:50%;
    background:var(--orb);
  }
  .chip:hover{ border-color:var(--cyan); box-shadow:var(--shadow); }
  .chip:active{ transform:translateY(1px); }
  .chip:focus-visible{ outline:2px solid var(--blue); outline-offset:2px; }
  .quickchips{ margin:6px 0 8px 42px; max-width:620px; }
  @media (max-width:560px){ .quickchips{ margin-left:0; } }

  /* Messages */
  .msg{ display:flex; margin:18px 0; }
  .msg.user{ justify-content:flex-end; }
  .bubble{
    max-width:min(85%,620px); padding:14px 18px; border-radius:var(--radius);
    font-size:15.5px; line-height:1.62; word-wrap:break-word;
  }
  .msg.user .bubble{
    background:linear-gradient(135deg,var(--blue-600),var(--blue));
    color:#EAF5FC; border-bottom-right-radius:5px;
    box-shadow:0 6px 16px rgba(0,120,192,.22);
  }
  .msg.bot .bubble{
    background:var(--surface); color:var(--ink);
    border:1px solid var(--line); border-bottom-left-radius:5px;
    box-shadow:var(--shadow);
  }
  .msg.bot .bubble p{ margin:0 0 10px; }
  .msg.bot .bubble p:last-child{ margin-bottom:0; }
  .msg.bot .bubble p.md-h{ font-weight:700; color:var(--blue-dark); margin-top:4px; }
  .msg.bot .bubble ul,.msg.bot .bubble ol{ margin:6px 0 12px; padding-left:22px; }
  .msg.bot .bubble li{ margin:4px 0; }
  .msg.bot .bubble li::marker{ color:var(--blue); }
  .msg.bot .bubble strong{ color:var(--blue-deep); font-weight:600; }
  .msg.bot .bubble code{
    background:var(--paper); border:1px solid var(--line); border-radius:5px;
    padding:1px 5px; font-size:.9em; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  .avatar{
    flex:0 0 auto; width:30px; height:30px; border-radius:50%;
    background:var(--orb); color:#fff;
    display:grid; place-items:center; margin-right:12px; margin-top:2px;
    box-shadow:0 2px 6px rgba(0,120,192,.3);
  }
  .msg.error .bubble{ background:#FBECEC; border:1px solid #E7BEBE; color:#8A2C2C; box-shadow:none; }

  /* typing */
  .typing{ display:inline-flex; gap:5px; align-items:center; padding:4px 2px; }
  .typing span{
    width:7px; height:7px; border-radius:50%; background:var(--cyan);
    animation:bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay:.15s; }
  .typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce{ 0%,60%,100%{ transform:translateY(0); opacity:.45; } 30%{ transform:translateY(-5px); opacity:1; } }

  /* ---------- Composer ---------- */
  .composer-wrap{ flex:0 0 auto; background:linear-gradient(to top,var(--paper) 72%,rgba(238,243,248,0)); padding:8px 0 14px; }
  .composer{ max-width:760px; margin:0 auto; padding:0 clamp(16px,4vw,24px); }
  .field{
    display:flex; align-items:flex-end; gap:10px;
    background:var(--surface); border:1px solid var(--line); border-radius:20px;
    padding:8px 8px 8px 18px; box-shadow:var(--shadow);
    transition:border-color .15s, box-shadow .15s;
  }
  .field:focus-within{ border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,120,192,.12), var(--shadow); }
  textarea#input{
    flex:1 1 auto; border:none; outline:none; resize:none; background:transparent;
    font:inherit; font-size:15.5px; color:var(--ink); line-height:1.5;
    max-height:180px; padding:9px 0; max-width:100%;
  }
  textarea#input::placeholder{ color:#93A4B0; }
  .send{
    flex:0 0 auto; width:42px; height:42px; border-radius:50%; border:none; cursor:pointer;
    background:var(--orb); color:#fff;
    display:grid; place-items:center; transition:filter .15s, transform .05s;
    box-shadow:0 3px 10px rgba(0,120,192,.35);
  }
  .send:hover:not(:disabled){ filter:brightness(1.06); }
  .send:active:not(:disabled){ transform:scale(.94); }
  .send:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; }
  .send:focus-visible{ outline:2px solid var(--blue-dark); outline-offset:2px; }
  .disclaimer{
    max-width:760px; margin:8px auto 0; padding:0 clamp(16px,4vw,24px);
    font-size:11.5px; color:var(--muted); text-align:center; line-height:1.45;
  }
  .disclaimer .cobrand-note{ color:var(--blue-deep); font-weight:600; }

  @media (prefers-reduced-motion:reduce){
    *{ animation:none !important; scroll-behavior:auto !important; transition:none !important; }
  }
</style>
</head>
<body>

  <header class="topbar">
    <!-- CO-BRANDING: marca pessoal + logotipo Engeval (parceria) -->
    <div class="cobrand">
      <div class="personal">
        <!-- Nome da marca pessoal (co-branding com a Engeval).
             Para usar um logotipo próprio, troque este texto por uma <img>. -->
        <span class="personal-name">Marco Souza</span>
        <span class="partner">
          <span class="partner-label">em parceria com</span>
          <img class="engeval-logo" src="assets/logo-engeval.png" alt="Engeval" />
        </span>
      </div>
    </div>

    <div class="actions">
      <span class="tag">Orientação de finanças pessoais</span>
      <button class="newchat" id="newChat" type="button">Nova conversa</button>
    </div>
  </header>

  <main class="stage" id="stage">
    <div class="stage-inner" id="thread"><!-- a saudação e o menu são inseridos por JS --></div>
  </main>

  <div class="composer-wrap">
    <div class="composer">
      <div class="field">
        <textarea id="input" rows="1" placeholder="Escreva sua pergunta sobre finanças…" autocomplete="off"></textarea>
        <button class="send" id="send" type="button" aria-label="Enviar mensagem" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M4 12 L20 4 L14 20 L11.5 13.5 Z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
    <p class="disclaimer">
      <span class="cobrand-note">Uma iniciativa Marco Souza × Engeval.</span>
      As orientações têm caráter educativo e não constituem recomendação de investimento ou consultoria financeira individual.
    </p>
  </div>

<script>
(function(){
  const stage   = document.getElementById('stage');
  const thread  = document.getElementById('thread');
  const input   = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const newChat = document.getElementById('newChat');

  // Histórico enviado ao GPT (o system prompt fica no servidor, em /api/chat)
  let history = [];
  let busy = false;

  // ID único desta conversa — usado para salvar o histórico no banco de dados.
  // "Nova conversa" recarrega a página e gera um novo ID.
  const conversationId = (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : 'c-' + Date.now() + '-' + Math.random().toString(36).slice(2);

  // Saudação de abertura (definida no prompt, seção 14).
  // Mostrada na tela e registrada no histórico para o GPT não repetir.
  const GREETING_DISPLAY =
    "Olá! Eu sou seu Orientador Financeiro.\n\n"+
    "Posso te ajudar a tirar dúvidas, organizar suas contas, entender dívidas, planejar objetivos ou comparar opções financeiras.\n\n"+
    "Escolha uma opção abaixo ou simplesmente me conte o que está acontecendo. Como posso te ajudar hoje?";
  const GREETING_HISTORY =
    "Olá! Eu sou seu Orientador Financeiro.\n\n"+
    "Posso te ajudar a tirar dúvidas, organizar suas contas, entender dívidas, planejar objetivos ou comparar opções financeiras.\n\n"+
    "Você pode escolher uma opção:\n\n"+
    "1 — Tenho uma dúvida sobre dinheiro.\n2 — Quero organizar minhas finanças.\n"+
    "3 — Estou com dívidas.\n4 — Quero começar a guardar dinheiro.\n"+
    "5 — Quero fazer um planejamento.\n6 — Quero comparar duas opções.\n\n"+
    "Ou simplesmente me conte o que está acontecendo.\n\nPara começar, como posso te ajudar hoje?";
  const OPTIONS = [
    "Tenho uma dúvida sobre dinheiro",
    "Quero organizar minhas finanças",
    "Estou com dívidas",
    "Quero começar a guardar dinheiro",
    "Quero fazer um planejamento",
    "Quero comparar duas opções"
  ];

  /* ---------- utilidades ---------- */
  function escapeHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function inline(t){
    return t
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/(^|[^*])\*(?!\s)([^*]+?)\*(?!\*)/g,'$1<em>$2</em>')
      .replace(/`(.+?)`/g,'<code>$1</code>');
  }
  function renderMarkdown(text){
    const lines = escapeHtml(text).split(/\r?\n/);
    let html='', inUl=false, inOl=false;
    const closeLists=()=>{ if(inUl){html+='</ul>';inUl=false;} if(inOl){html+='</ol>';inOl=false;} };
    for(const raw of lines){
      const line=raw.trim();
      if(line===''){ closeLists(); continue; }
      let m;
      if((m=line.match(/^#{1,4}\s+(.*)$/))){ closeLists(); html+='<p class="md-h">'+inline(m[1])+'</p>'; continue; }
      if((m=line.match(/^[-*]\s+(.*)$/))){
        if(inOl){html+='</ol>';inOl=false;}
        if(!inUl){html+='<ul>';inUl=true;}
        html+='<li>'+inline(m[1])+'</li>'; continue;
      }
      if((m=line.match(/^\d+[.)]\s+(.*)$/))){
        if(inUl){html+='</ul>';inUl=false;}
        if(!inOl){html+='<ol>';inOl=true;}
        html+='<li>'+inline(m[1])+'</li>'; continue;
      }
      closeLists();
      html+='<p>'+inline(line)+'</p>';
    }
    closeLists();
    return html;
  }
  function scrollDown(){ stage.scrollTop = stage.scrollHeight; }

  /* ---------- render de mensagens ---------- */
  function addUser(text){
    const el=document.createElement('div');
    el.className='msg user';
    el.innerHTML='<div class="bubble"></div>';
    el.querySelector('.bubble').textContent=text;
    thread.appendChild(el); scrollDown();
  }
  function addBot(html, kind){
    const el=document.createElement('div');
    el.className='msg '+(kind||'bot');
    el.innerHTML='<div class="avatar" aria-hidden="true">'+
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3 L14.5 12 L12 21 L9.5 12 Z" fill="currentColor"/></svg>'+
      '</div><div class="bubble"></div>';
    el.querySelector('.bubble').innerHTML=html;
    thread.appendChild(el); scrollDown();
    return el;
  }
  function showTyping(){
    return addBot('<div class="typing"><span></span><span></span><span></span></div>','bot');
  }

  /* ---------- envio ---------- */
  async function send(text){
    if(busy) return;
    text=(text||'').trim();
    if(!text) return;

    const qc=document.querySelector('.quickchips'); if(qc){ qc.remove(); }
    addUser(text);
    history.push({ role:'user', content:text });

    input.value=''; autoGrow(); toggleSend();
    busy=true; sendBtn.disabled=true;

    const typingEl=showTyping();

    try{
      const res=await fetch('/api/chat',{
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body:JSON.stringify({ messages:history, conversationId })
      });

      if(!res.ok){
        let detail='';
        try{ const j=await res.json(); detail=j.error||''; }catch(e){}
        throw new Error(detail || ('Erro '+res.status));
      }

      const data=await res.json();
      const reply=(data && data.reply) ? data.reply : 'Não consegui gerar uma resposta agora.';
      typingEl.querySelector('.bubble').innerHTML=renderMarkdown(reply);
      history.push({ role:'assistant', content:reply });
      scrollDown();
    }catch(err){
      typingEl.className='msg error';
      typingEl.querySelector('.bubble').innerHTML=
        '<strong>Não foi possível responder.</strong><br>'+
        escapeHtml(err.message||'Verifique a conexão e tente novamente.')+
        '<br><span style="opacity:.75">Se acabou de publicar, confirme se a chave da API foi configurada na Vercel.</span>';
    }finally{
      busy=false; toggleSend();
    }
  }

  /* ---------- input UX ---------- */
  function autoGrow(){
    input.style.height='auto';
    input.style.height=Math.min(input.scrollHeight,180)+'px';
  }
  function toggleSend(){ sendBtn.disabled = busy || input.value.trim()===''; }

  input.addEventListener('input',()=>{ autoGrow(); toggleSend(); });
  input.addEventListener('keydown',(e)=>{
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(input.value); }
  });
  sendBtn.addEventListener('click',()=> send(input.value));
  newChat.addEventListener('click',()=>{ location.reload(); });

  /* ---------- saudação inicial (menu do prompt) ---------- */
  function showGreeting(){
    addBot(renderMarkdown(GREETING_DISPLAY));
    history.push({ role:'assistant', content:GREETING_HISTORY });

    const wrap=document.createElement('div');
    wrap.className='quickchips chips';
    OPTIONS.forEach((opt,i)=>{
      const b=document.createElement('button');
      b.type='button'; b.className='chip';
      b.textContent=(i+1)+' — '+opt;
      b.addEventListener('click',()=> send(opt));
      wrap.appendChild(b);
    });
    thread.appendChild(wrap);
    scrollDown();
  }

  showGreeting();
  input.focus();
})();
</script>
</body>
</html>
