<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Histórico de conversas — Marco Souza × Engeval</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EEF3F8; --surface:#FFFFFF;
    --blue:#0078C0; --blue-deep:#005B92; --blue-dark:#00406B; --cyan:#309CD8;
    --ink:#16232E; --muted:#5B6E7B; --line:#D9E4EC;
    --shadow:0 1px 2px rgba(0,64,107,.06), 0 10px 28px rgba(0,64,107,.07);
    --orb:radial-gradient(circle at 32% 28%, #86C7EC 0%, #1E8BCE 42%, #0078C0 66%, #005B92 100%);
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Inter',system-ui,sans-serif; background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased; }
  .topbar{ display:flex; align-items:center; gap:12px; padding:14px clamp(16px,4vw,32px); background:var(--surface); border-bottom:1px solid var(--line); box-shadow:0 1px 2px rgba(0,64,107,.08); }
  .topbar .dot{ width:14px; height:14px; border-radius:50%; background:var(--orb); }
  .topbar h1{ font-family:'Archivo',sans-serif; font-weight:800; font-size:18px; color:var(--blue-dark); margin:0; letter-spacing:-.01em; }
  .topbar .sub{ font-size:12.5px; color:var(--muted); margin-left:auto; }
  .wrap{ max-width:960px; margin:0 auto; padding:clamp(20px,4vw,36px) clamp(16px,4vw,24px); }

  /* Login */
  .gate{ max-width:380px; margin:8vh auto 0; background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:28px; box-shadow:var(--shadow); }
  .gate h2{ font-family:'Archivo',sans-serif; font-weight:700; font-size:20px; color:var(--blue-dark); margin:0 0 6px; }
  .gate p{ font-size:13.5px; color:var(--muted); margin:0 0 18px; line-height:1.5; }
  .gate label{ display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; }
  input[type=password]{ width:100%; font:inherit; font-size:15px; padding:11px 13px; border:1px solid var(--line); border-radius:10px; outline:none; }
  input[type=password]:focus{ border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,120,192,.12); }
  .btn{ font:inherit; font-weight:600; font-size:14px; color:#fff; background:var(--orb); border:none; border-radius:10px; padding:11px 18px; cursor:pointer; margin-top:14px; width:100%; box-shadow:0 3px 10px rgba(0,120,192,.3); }
  .btn:hover{ filter:brightness(1.05); }
  .err{ color:#8A2C2C; font-size:13px; margin-top:12px; min-height:18px; }

  /* Layout do histórico */
  .cols{ display:grid; grid-template-columns:340px 1fr; gap:18px; align-items:start; }
  @media (max-width:720px){ .cols{ grid-template-columns:1fr; } }
  .panel{ background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); overflow:hidden; }
  .panel-head{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--line); }
  .panel-head strong{ font-family:'Archivo',sans-serif; font-size:14px; color:var(--blue-dark); }
  .panel-head .count{ font-size:12px; color:var(--muted); }
  .list{ max-height:70vh; overflow-y:auto; }
  .item{ display:block; width:100%; text-align:left; font:inherit; background:none; border:none; border-bottom:1px solid var(--line); padding:13px 16px; cursor:pointer; }
  .item:hover{ background:#F3F9FD; }
  .item.active{ background:#EAF4FB; box-shadow:inset 3px 0 0 var(--blue); }
  .item .when{ font-size:11.5px; color:var(--muted); margin-bottom:3px; }
  .item .prev{ font-size:13.5px; color:var(--ink); line-height:1.35; }
  .item .meta{ font-size:11px; color:var(--cyan); margin-top:3px; font-weight:600; }

  .transcript{ padding:18px; min-height:200px; }
  .empty{ color:var(--muted); font-size:14px; padding:40px 18px; text-align:center; }
  .msg{ margin:0 0 14px; }
  .msg .role{ font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; margin-bottom:4px; }
  .msg.user .role{ color:var(--blue); }
  .msg.assistant .role{ color:var(--muted); }
  .msg .body{ font-size:14.5px; line-height:1.6; white-space:pre-wrap; background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:11px 14px; }
  .msg.user .body{ background:#EAF4FB; border-color:#CFE6F5; }
  .toolbar{ display:flex; gap:10px; margin-bottom:16px; }
  .toolbar button{ font:inherit; font-size:13px; font-weight:600; color:var(--blue-deep); background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:8px 14px; cursor:pointer; }
  .toolbar button:hover{ border-color:var(--cyan); color:var(--blue); }
</style>
</head>
<body>

  <div class="topbar">
    <span class="dot" aria-hidden="true"></span>
    <h1>Histórico de conversas</h1>
    <span class="sub">Marco Souza × Engeval — painel interno</span>
  </div>

  <div class="wrap" id="wrap">

    <!-- Tela de senha -->
    <div class="gate" id="gate">
      <h2>Acesso restrito</h2>
      <p>Informe a senha administrativa para visualizar as conversas.</p>
      <label for="pw">Senha</label>
      <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password" />
      <button class="btn" id="enter" type="button">Entrar</button>
      <div class="err" id="gateErr"></div>
    </div>

    <!-- Painel do histórico (oculto até logar) -->
    <div id="dash" style="display:none">
      <div class="toolbar">
        <button id="reload" type="button">Atualizar</button>
        <button id="logout" type="button">Sair</button>
      </div>
      <div class="cols">
        <div class="panel">
          <div class="panel-head"><strong>Conversas</strong><span class="count" id="count">—</span></div>
          <div class="list" id="list"></div>
        </div>
        <div class="panel">
          <div class="panel-head"><strong id="detailTitle">Detalhe</strong></div>
          <div class="transcript" id="transcript"><div class="empty">Selecione uma conversa à esquerda.</div></div>
        </div>
      </div>
    </div>

  </div>

<script>
(function(){
  const gate=document.getElementById('gate');
  const dash=document.getElementById('dash');
  const pw=document.getElementById('pw');
  const enter=document.getElementById('enter');
  const gateErr=document.getElementById('gateErr');
  const list=document.getElementById('list');
  const countEl=document.getElementById('count');
  const transcript=document.getElementById('transcript');
  const detailTitle=document.getElementById('detailTitle');

  let key='';

  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmt(ts){ if(!ts) return ''; const d=new Date(ts); return d.toLocaleString('pt-BR'); }

  async function api(params){
    const url='/api/history'+(params?('?'+params):'');
    const r=await fetch(url,{ headers:{ 'x-admin-key':key } });
    if(r.status===401) throw new Error('Senha incorreta.');
    if(!r.ok){ let m='Erro ao consultar.'; try{ const j=await r.json(); m=j.error||m; }catch(e){} throw new Error(m); }
    return r.json();
  }

  async function login(){
    key=pw.value.trim();
    gateErr.textContent='';
    if(!key){ gateErr.textContent='Digite a senha.'; return; }
    try{
      await api('');            // valida a senha listando as conversas
      gate.style.display='none';
      dash.style.display='block';
      loadList();
    }catch(err){
      gateErr.textContent=err.message;
    }
  }

  async function loadList(){
    list.innerHTML='<div class="empty">Carregando…</div>';
    try{
      const { conversations }=await api('');
      countEl.textContent=conversations.length+' registro(s)';
      if(!conversations.length){ list.innerHTML='<div class="empty">Nenhuma conversa registrada ainda.</div>'; return; }
      list.innerHTML='';
      conversations.forEach(c=>{
        const b=document.createElement('button');
        b.className='item'; b.dataset.id=c.id;
        b.innerHTML='<div class="when">'+esc(fmt(c.updatedAt))+'</div>'+
                    '<div class="prev">'+esc(c.preview)+'</div>'+
                    '<div class="meta">'+c.count+' mensagens</div>';
        b.addEventListener('click',()=> openConversation(c.id, b));
        list.appendChild(b);
      });
    }catch(err){
      list.innerHTML='<div class="empty">'+esc(err.message)+'</div>';
    }
  }

  async function openConversation(id, btn){
    document.querySelectorAll('.item').forEach(i=>i.classList.remove('active'));
    if(btn) btn.classList.add('active');
    transcript.innerHTML='<div class="empty">Carregando…</div>';
    detailTitle.textContent='Detalhe';
    try{
      const { conversation }=await api('id='+encodeURIComponent(id));
      detailTitle.textContent='Conversa · '+fmt(conversation.updatedAt);
      const msgs=conversation.messages||[];
      transcript.innerHTML = msgs.map(m=>{
        const role = m.role==='user' ? 'Usuário' : 'Orientador';
        return '<div class="msg '+esc(m.role)+'"><div class="role">'+role+'</div>'+
               '<div class="body">'+esc(m.content)+'</div></div>';
      }).join('') || '<div class="empty">Conversa vazia.</div>';
    }catch(err){
      transcript.innerHTML='<div class="empty">'+esc(err.message)+'</div>';
    }
  }

  enter.addEventListener('click', login);
  pw.addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
  document.getElementById('reload').addEventListener('click', loadList);
  document.getElementById('logout').addEventListener('click', ()=>{ key=''; pw.value=''; dash.style.display='none'; gate.style.display='block'; });

  pw.focus();
})();
</script>
</body>
</html>
